<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bench — maps</title>
    <meta
      name="description"
      content="A map of benches across Manhattan."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="page-map">
    <header class="site-header">
      <a href="index.html" class="site-title">bench</a>
      <nav class="site-nav" aria-label="Main">
        <a href="index.html" class="active">maps</a>
        <span class="nav-sep">·</span>
        <a href="archive.html">archive</a>
        <span class="nav-sep">·</span>
        <a href="about.html">about</a>
      </nav>
    </header>

    <div class="map-container">
      <div id="map" role="application" aria-label="Manhattan bench map"></div>
    </div>

    <div class="map-controls-left">
      <button
        type="button"
        class="map-control-btn map-toggle"
        id="labelsToggle"
        aria-pressed="false"
      >
        labels
      </button>
    </div>

    <div class="map-controls">
      <button type="button" class="map-control-btn" id="zoomIn" aria-label="Zoom in">
        +
      </button>
      <button type="button" class="map-control-btn" id="zoomOut" aria-label="Zoom out">
        −
      </button>
    </div>

    <div class="panel-overlay" id="panelOverlay" aria-hidden="true"></div>

    <aside
      class="detail-panel"
      id="detailPanel"
      role="dialog"
      aria-labelledby="panelName"
      aria-hidden="true"
    >
      <button type="button" class="panel-close" id="panelClose">close</button>
      <div class="panel-id" id="panelId"></div>
      <h2 class="panel-name" id="panelName"></h2>
      <div class="panel-meta" id="panelCoords"></div>
      <div class="panel-meta" id="panelCategory"></div>
      <p class="panel-notes" id="panelNotes"></p>
      <a href="#" class="panel-link" id="panelArchiveLink">view in archive</a>
    </aside>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="js/map.js"></script>
  </body>
</html>
